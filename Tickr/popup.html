<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tickr</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      width: 260px;
      padding: 15px;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 5px;
    }

    .status {
      margin-bottom: 15px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    #startBtn {
      background: #ddd;
    }

    #buyBtn {
      background: #4CAF50;
      color: white;
    }

    #activateBtn, #saveTelegram {
      background: black;
      color: white;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #telegramSection {
      display: none;
      margin-top: 10px;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }

    /* ℹ️ Tooltip */
    .info {
      position: relative;
      display: inline-block;
      cursor: pointer;
      margin-left: 5px;
    }

    .infoText {
      visibility: hidden;
      width: 200px;
      background: black;
      color: #fff;
      text-align: left;
      padding: 8px;
      border-radius: 6px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      margin-left: -100px;
      font-size: 12px;
    }

    .info:hover .infoText {
      visibility: visible;
    }
  </style>
</head>

<body>

  <h2>🎟️ Tickr</h2>

  <div id="status" class="status">🔴 Paused</div>

  <button id="startBtn">▶️ Start bot</button>

  <!-- 💳 Buy Premium -->
  <button id="buyBtn">
    💳 Buy Premium
    <span class="info">ℹ️
      <span class="infoText">
        • Faster refresh  
        • Telegram alerts  
        • Sound alerts  
        • Tab notification  
      </span>
    </span>
  </button>

  <input id="codeInput" placeholder="Enter code" />
  <button id="activateBtn">Activate</button>

  <!-- 📲 Telegram -->
  <div id="telegramSection">
    <input id="chatId" placeholder="Telegram Chat ID" />
    <button id="saveTelegram">Save Telegram</button>
  </div>

  <div class="small">£3 one-time unlock</div>

  <script src="popup.js"></script>
</body>
</html>
