<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tickr</title>

  <style>
    body {
      font-family: Arial;
      width: 260px;
      padding: 15px;
      text-align: center;
      background: #f5f5f5;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    #startBtn { background: #ddd; }
    #coffeeBtn { background: #ff813f; color: white; }
    #saveTelegram { background: black; color: white; }
    #testTelegram { background: #2a2a2a; color: white;}

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .label {
      font-size: 12px;
      margin-top: 10px;
      text-align: left;
    }

    /* ℹ️ Tooltip */
    .info {
      position: relative;
      cursor: pointer;
      margin-left: 5px;
    }

    .infoText {
      visibility: hidden;
      width: 220px;
      background: black;
      color: white;
      text-align: left;
      padding: 8px;
      border-radius: 6px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      margin-left: -110px;
      font-size: 11px;
    }

    .info:hover .infoText {
      visibility: visible;
    }

    
  </style>
</head>

<body>

  <h2>🎟️ Tickr</h2>

  <div id="status">🔴 Paused</div>

  <button id="startBtn">▶️ Start tracking</button>

  <!-- TELEGRAM -->
  <div class="label">
    Telegram Bot Token
    <span class="info">ℹ️
      <span class="infoText">
        1. Open Telegram  
        2. Search @BotFather  
        3. Type /start → /newbot  
        4. Copy your token  
      </span>
    </span>
  </div>
  <input id="token" placeholder="Bot token" />

  <div class="label">
    Chat ID
    <span class="info">ℹ️
      <span class="infoText">
        1. Search @userinfobot  
        2. Click Start  
        3. Copy your ID  
      </span>
    </span>
  </div>
  <input id="chatId" placeholder="Chat ID" />

  <button id="saveTelegram">Save Telegram</button>

  <button id="testTelegram">Test Telegram</button>

  <button id="coffeeBtn">☕ Buy me a coffee</button>

  <script src="popup.js"></script>
</body>
</html>
